name: 블로그 꾸미기
description: 제목/부제목/아바타/강조 색상을 바꿉니다. 제출하면 자동으로 반영됩니다.
title: "블로그 꾸미기"
labels: ["customize"]
body:
  - type: input
    id: title
    attributes:
      label: 사이트 제목
      description: 사이드바 상단에 표시되는 이름입니다. 비워두면 바꾸지 않습니다.
      placeholder: "공부 기록"
    validations:
      required: false

  - type: input
    id: tagline
    attributes:
      label: 부제목 (태그라인)
      description: 제목 아래에 작게 표시됩니다. 비워두면 바꾸지 않습니다.
      placeholder: "개발/프로그래밍을 공부하며 정리하는 블로그"
    validations:
      required: false

  - type: input
    id: avatar_url
    attributes:
      label: 아바타 이미지 URL
      description: 사이드바에 동그랗게 표시되는 이미지입니다. 이미지 주소(URL)를 붙여넣으세요. 비워두면 바꾸지 않습니다.
      placeholder: "https://example.com/my-photo.png"
    validations:
      required: false

  - type: input
    id: accent_color
    attributes:
      label: 강조 색상 (hex 코드)
      description: 링크, 활성 메뉴 등에 쓰이는 색입니다. 예) #0056b2, #e63946. 비워두면 바꾸지 않습니다.
      placeholder: "#0056b2"
    validations:
      required: false
