name: Publish post from issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  actions: write

concurrency:
  group: publish-post
  cancel-in-progress: false

jobs:
  publish:
    if: >
      contains(github.event.issue.labels.*.name, 'post') &&
      github.event.issue.user.login == 'dabi-hookingpoint'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create post file
        id: create
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python3 .github/scripts/create_post.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.create.outputs.filename }}"
          git commit -m "Add post from issue #${{ github.event.issue.number }}"
          git push

      - name: Trigger Pages build
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages-deploy.yml --ref master

      - name: Close issue with confirmation
        uses: actions/github-script@v7
        with:
          script: |
            const filename = `${{ steps.create.outputs.filename }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `게시되었습니다! 1~2분 후 블로그에서 확인하세요.\n\n\`${filename}\``,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
            });
