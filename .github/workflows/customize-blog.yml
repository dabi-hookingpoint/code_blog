name: Apply blog customization from issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: publish-post
  cancel-in-progress: false

jobs:
  customize:
    if: >
      contains(github.event.issue.labels.*.name, 'customize') &&
      github.event.issue.user.login == 'dabi-hookingpoint'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply customization
        id: apply
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python3 .github/scripts/apply_customization.py

      - name: Commit and push
        if: steps.apply.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _config.yml _sass/themes/_light.scss _sass/themes/_dark.scss
          git commit -m "chore: apply blog customization from issue #${{ github.event.issue.number }}"
          git push

      - name: Close issue with confirmation
        uses: actions/github-script@v7
        with:
          script: |
            const changed = `${{ steps.apply.outputs.changed }}`;
            const hasChanges = `${{ steps.apply.outputs.has_changes }}` === 'true';
            const body = hasChanges
              ? `적용했습니다! 1~2분 후 블로그에서 확인하세요.\n\n- ${changed}`
              : `${changed}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
            });
